app:
  baseUrl: ${APP_BASE_URL}

backend:
  baseUrl: ${APP_BASE_URL}

  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

auth:
  environment: production
  providers:
    # oauth2-proxy handles the full Microsoft OIDC flow at the proxy layer.
    # MSGraph syncs users from Entra ID but the 'mail' attribute is often null
    # for .onmicrosoft.com accounts so spec.profile.email won't be set.
    # Use the local part of the UPN (e.g. 'reza' from
    # 'reza@rkaramadgmail.onmicrosoft.com') matched against entity metadata.name
    # which MSGraph derives from the UPN local part.
    oauth2Proxy:
      signIn:
        resolvers:
          - resolver: emailLocalPartMatchingUserEntityName

catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, User, Group]
  locations:
    - type: file
      target: ./catalog/org.yaml
      rules:
        - allow: [User, Group]

  providers:
    microsoftGraphOrg:
      default:
        tenantId: ${MSGRAPH_TENANT_ID}
        clientId: ${MSGRAPH_CLIENT_ID}
        clientSecret: ${MSGRAPH_CLIENT_SECRET}
        # Sync all users and groups from the tenant.
        # Restrict with userFilter / groupFilter if the tenant grows large.
        user:
          filter: accountEnabled eq true
        group:
          filter: >
            securityEnabled eq true
        schedule:
          frequency: { minutes: 30 }
          timeout: { minutes: 5 }
